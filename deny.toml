# cargo-deny configuration (advisory in M1; wired into CI as a non-blocking lane).
#
# Cargo has no install-time hooks (unlike npm), but `build.rs` + proc-macros run arbitrary code at
# BUILD time with no blanket disable — the cargo analogue of npm's ignore-scripts risk. cargo-deny
# (advisories + bans + sources + licenses) is the governance for that build-time surface. See the
# README "supply chain" note and the spike R9.

[advisories]
# RustSec advisory DB. Fail on a vulnerability; warn on unmaintained/unsound until triaged.
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
# Permissive licenses acceptable for an MIT-OR-Apache-2.0 crate.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "OpenSSL",
  # Boost Software License — OSI-approved, permissive (MIT-equivalent terms). Pulled in transitively by
  # `xxhash-rust` (a non-optional dep of the `redis` crate behind the opt-in `redis-replay` feature for
  # the distributed DPoP-jti replay store). BSL-1.0 imposes no copyleft and no source-disclosure
  # obligation, so it is compatible with the MIT-OR-Apache-2.0 crate.
  "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# The DPoP/Solid-OIDC verifier is consumed as a git dependency (its crates.io publish is deferred —
# spike §12 / its own suite.json). M2: pin to a tag/rev once it cuts a release.
allow-git = ["https://github.com/jeswr/solid-oidc-verifier"]
