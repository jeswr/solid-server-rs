# roborev post-commit review config — matches the solid-app-suite standard.
# Experimental but security-touching crate (it wires in the DPoP/Solid-OIDC verifier): every commit
# is reviewed by a non-Anthropic model (codex), at the suite's low severity floor.

agent = "codex"
model = "gpt-5.5"

review_min_severity = "low"

reuse_review_session = true
reuse_review_session_lookback = 5
